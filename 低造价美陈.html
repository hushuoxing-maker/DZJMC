<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低造价节庆美陈 3D 效果图生成器-古月AI智能体</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background: linear-gradient(135deg,#ffe7d1,#ffd2d2,#c1e7ff,#d2f0ff);
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
  min-height:100vh;
  color:#fff;
  padding:60px;
}
@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.container{max-width:1200px;margin:auto;}
h1{text-align:center;font-size:32px;margin-bottom:40px;font-weight:800;text-shadow:2px 2px 6px rgba(0,0,0,0.5);}
.card{
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:25px;
  border:2px solid;
  border-image: linear-gradient(45deg,#ffe7d1,#ffd2d2,#c1e7ff,#d2f0ff) 1;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  margin-bottom:30px;
  transition:0.3s;
}
.card:hover{transform:translateY(-3px) scale(1.02);}
label{font-size:14px;opacity:0.9;color:#fff;}
input, select{
  width:100%;
  padding:14px;
  margin-top:8px;
  margin-bottom:18px;
  background:rgba(0,0,0,0.35);
  border:1px solid #fff;
  border-radius:12px;
  color:white;
  font-size:16px;
}
button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
  background: linear-gradient(135deg,#ffe7d1,#ffd2d2,#c1e7ff,#d2f0ff);
  color:#000;
  box-shadow:0 6px 18px rgba(0,0,0,0.5);
  transition:0.3s;
}
button:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.6);}
.generate{width:100%;margin-top:10px;}
.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(450px,1fr));gap:20px;}
.promptCard{
  background:rgba(0,0,0,0.65);
  border-radius:18px;
  border-left:5px solid #ffd2d2;
  border-top:5px solid #ffe7d1;
  padding:22px;
  line-height:1.8;
  position:relative;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:0.3s;
}
.promptCard:hover{transform:scale(1.02);}
.promptTitle{font-size:18px;font-weight:800;margin-bottom:10px;color:#ffd2d2;text-shadow:1px 1px 3px #000;}
.promptText{white-space:pre-wrap;font-size:14px;opacity:0.95;color:#fff;}
.copyBtn{
  margin-top:16px;
  background:linear-gradient(135deg,#c1e7ff,#d2f0ff,#ffe7d1);
  padding:8px 16px;
  border-radius:10px;
  color:#000;
  border:none;
  cursor:pointer;
  font-weight:700;
  transition:0.3s;
}
.copyBtn.copied{background:rgba(100,100,100,0.8);color:#fff;}
.copyBtn:hover{transform:translateY(-2px);}
</style>
</head>
<body>
<div class="container">
<h1>低造价节庆美陈 3D 效果图生成器-古月AI智能体</h1>

<div class="card">
<label>节日名称</label>
<input id="festival" placeholder="例如：春节、中秋、圣诞节">
<label>公司名称 / 行业（可选）</label>
<input id="company" placeholder="例如：餐饮公司、科技企业">
<label>场地类型（可选）</label>
<select id="venue">
  <option value="">通用美陈结构</option>
  <option value="前台">公司前台</option>
  <option value="大门口">公司大门口 / 入口区域</option>
  <option value="中庭">中庭 / 广场 / 开放空间</option>
</select>
<button class="generate" onclick="generate()">生成20组低造价节庆美陈提示词</button>
</div>

<div id="results" class="results"></div>
</div>

<script>
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

let assistTexts=[
  "低造价高创意","可落地施工","真实比例","板材易加工","主题突出","画面完成度高",
  "节日氛围强","行业属性融合","多层次构图","小体量前景点缀","写实风格","板材全画面设计",
  "低位辅助装饰","易安装","色彩自然","空间层次感","版式创意","主题文字清晰","前后错位叠加","结构安全稳固"
];

function generate(){
  let festival=document.getElementById("festival").value.trim();
  if(!festival){alert("请输入节日名称");return;}
  let company=document.getElementById("company").value.trim();
  let venue=document.getElementById("venue").value;
  let container=document.getElementById("results");
  container.innerHTML="";
  
  for(let i=1;i<=20;i++){
    let assist1=rand(assistTexts);
    let assist2=rand(assistTexts);
    let assist3=rand(assistTexts);
    while(assist2===assist1) assist2=rand(assistTexts);
    while(assist3===assist1 || assist3===assist2) assist3=rand(assistTexts);
    
    let text=`你需要设计的美陈是以节日${festival}为主题的低造价3D装置，${company?("结合"+company+"行业属性，"):""}材质使用KT板与PVC板，多层叠加结构，中间主背景板+辅助异形背板+低位前景点缀，整体真实比例，可施工，画面完整且富有节日氛围${venue?("，场地类型："+venue+"，装置结构根据场地自动调整"):""}，应用场景是各类空间（商业 / 公共 / 文化）+ 特定节日，核心目标是烘托节日氛围、传递节日情感，设计重点是：强化节日符号；色彩贴合节日调性并融合行业属性；在低造价条件下追求最佳设计感与画面完成度；材质低造价、易制作、易安装，需要中文提示词。辅助信息：${assist1}，${assist2}，${assist3}`;
    
    let card=document.createElement("div");
    card.className="promptCard";
    card.innerHTML=`
      <div class="promptTitle">提示词 #${i}</div>
      <div class="promptText">${text}</div>
      <button class="copyBtn">复制提示词</button>
    `;
    let btn=card.querySelector("button");
    btn.onclick=function(){
      navigator.clipboard.writeText(text);
      btn.innerText="已复制";
      btn.classList.add("copied");
      setTimeout(()=>{
        btn.innerText="复制提示词";
        btn.classList.remove("copied");
      },3000);
    };
    container.appendChild(card);
  }
}
</script>
</body>
</html>
